name: ✅ Validate PR

# pull_request_target corre en el contexto de main (permisos para comentar en PRs de forks)
on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: 🔍 Validate contribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (main)
        uses: actions/checkout@v4

      # Trae solo contributors/ desde el head de la PR (scripts siguen siendo de main)
      - name: Fetch contributors/ from PR
        run: |
          git fetch https://github.com/${{ github.event.pull_request.head.repo.full_name }}.git ${{ github.event.pull_request.head.sha }}
          git checkout FETCH_HEAD -- contributors/ 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Get changed files
        id: changed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });
            const fileList = files.map(f => f.filename).join('\n');
            core.setOutput('files', fileList);
            console.log(fileList || '(ninguno)');

      - name: Run validator
        id: validate
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          set +e
          node scripts/validate-contributor.js
          EXIT_CODE=$?
          set -e
          echo "result=$([ $EXIT_CODE -eq 0 ] && echo success || echo failed)" >> $GITHUB_OUTPUT

      - name: Comment PR result
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let summary;
            try {
              summary = JSON.parse(fs.readFileSync('validation-summary.json', 'utf-8'));
            } catch {
              summary = { passed: false, forbiddenFiles: [], jsonResults: [] };
            }

            const changedFiles = `${{ steps.changed.outputs.files }}`.trim().split('\n').filter(Boolean);
            let body = summary.passed
              ? `## ✅ Validación exitosa\n\n¡Tu contribución cumple con todos los requisitos!\n\n`
              : `## ❌ Validación fallida\n\nHay errores que debes corregir antes del merge.\n\n`;

            body += `### 📁 Archivos modificados\n\n`;
            if (changedFiles.length === 0) {
              body += `_No se detectaron archivos modificados._\n\n`;
            } else {
              changedFiles.forEach(f => {
                body += `- ${f.startsWith('contributors/') ? '✅' : '🚫'} \`${f}\`\n`;
              });
              body += '\n';
            }

            if (summary.forbiddenFiles && summary.forbiddenFiles.length > 0) {
              body += `### 🚫 Archivos fuera de \`contributors/\`\n\n`;
              summary.forbiddenFiles.forEach(f => { body += `- \`${f}\`\n`; });
              body += `\n> Solo tu archivo \`contributors/tu-nickname.json\` debe aparecer en la PR.\n\n`;
            }

            if (summary.jsonResults && summary.jsonResults.length > 0) {
              body += `### 🔍 Resultados JSON\n\n`;
              summary.jsonResults.forEach(r => {
                body += r.errors.length === 0
                  ? `#### ✅ \`${r.file}\` — JSON válido\n`
                  : `#### ❌ \`${r.file}\`\n` + r.errors.map(e => `- ${e}`).join('\n') + '\n';
                body += '\n';
              });
            }

            if (!summary.passed) {
              body += `---\n\n### 📋 Estructura esperada\n\n\`\`\`json\n{\n  "name": "Tu Nombre",\n  "nickname": "tu-nickname",\n  "github": "https://github.com/tu-usuario",\n  "linkedin": "https://linkedin.com/in/tu-perfil",\n  "instagram": "https://instagram.com/tu-usuario",\n  "image": "https://github.com/tu-usuario.png",\n  "description": "Descripción breve",\n  "hobbies": ["Hobby 1", "Hobby 2"]\n}\n\`\`\`\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Validación automática generada por el workflow')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: botComment.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Set final status
        if: always()
        run: |
          if [ "${{ steps.validate.outputs.result }}" != "success" ]; then
            echo "❌ La validación falló. Revisa el comentario en la PR para más detalles."
            exit 1
          fi
          echo "✅ Todo correcto."
