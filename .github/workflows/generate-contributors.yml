name: 🤖 Generate Contributors

on:
  push:
    branches: [main]
    paths: ["contributors/**"]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    name: Generate contributors files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Generate contributors data
        run: node scripts/generate-contributors.js

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain public/index.json) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/index.json
          git commit -m "🤖 Auto-generate contributors data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
