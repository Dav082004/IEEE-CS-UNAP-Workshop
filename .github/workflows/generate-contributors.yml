name: 🤖 Generate Contributors

# Se ejecuta solo cuando hay cambios en la carpeta contributors/
on:
  push:
    branches:
      - main
    paths:
      - "contributors/**"
  workflow_dispatch: # Permite ejecución manual

# Permisos necesarios para hacer commits automáticos
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    name: Generate contributors files
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repositorio
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      # 2. Setup de Node.js
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      # 3. Ejecutar el script generador
      - name: 🏗️  Generate contributors data
        run: node scripts/generate-contributors.js

      # 4. Verificar si hay cambios
      - name: 🔍 Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain public/index.json) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      # 5. Configurar Git
      - name: ⚙️  Configure Git
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      # 6. Commit y push de cambios (solo en main branch)
      - name: 📤 Commit and push changes
        if: steps.check_changes.outputs.changes == 'true' && github.ref == 'refs/heads/main'
        run: |
          git add public/index.json
          git commit -m "🤖 Auto-generate contributors data

          Generated by: GitHub Actions
          Workflow: generate-contributors.yml
          Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          Changes:
          - public/index.json"
          git push

      # 7. Mensaje de éxito
      - name: ✅ Success
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          echo "✨ Contributors files generated successfully!"

      # 8. Mensaje si no hay cambios
      - name: ℹ️  No changes
        if: steps.check_changes.outputs.changes == 'false'
        run: |
          echo "ℹ️  No changes detected in contributors data."
